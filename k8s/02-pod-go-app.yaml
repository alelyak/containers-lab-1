---
apiVersion: v1
kind: Pod
metadata:
  name: go-app-pod
  labels:
    app: go
    lab: lab2
spec:
  imagePullSecrets:
    - name: ghcr-secret
  containers:
    - name: app
      image: ghcr.io/alelyak/containers-lab-1-app:v1.0.0
      ports:
        - containerPort: 8080
      resources:
        requests:
          memory: "64Mi"
          cpu: "250m"
        limits:
          memory: "128Mi"
          cpu: "500m"

