version: '3.8' 

services: 
  postgres: 
    image: postgres:15-alpine 
    environment: 
      POSTGRES_PASSWORD: secret 
      POSTGRES_DB: myapp_test 
    networks:
      - test-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app: 
    image: ${APP_IMAGE}
    environment: 
      DB_HOST: postgres 
      DB_PASSWORD: secret 
      DB_NAME: myapp_test 
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - test-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx: 
    image: ${NGINX_IMAGE}
    ports:
      - "80:80" 
    depends_on:
      app:
        condition: service_healthy
    networks:
      - test-network 
networks: 
  test-network:
